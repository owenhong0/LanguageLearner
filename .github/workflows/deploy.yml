name: Build, test & deploy to GitHub Pages

# A Vite app must be *built* before it can be served. GitHub Pages was
# previously serving the raw repo root, so it loaded /src/main.tsx (raw
# TypeScript the browser can't run) → blank screen. This workflow builds the
# app, runs the test suite as a gate, and publishes the compiled dist/.

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only the latest deploy matters; cancel superseded runs but let one finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      # Gate the deploy on the frontend-load tests. A failure here blocks
      # publishing a broken build.
      - name: Run tests
        run: npm test

      - name: Build
        run: npm run build

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
